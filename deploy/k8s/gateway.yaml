apiVersion: apps/v1
kind: Deployment
metadata:
  name: helmsman
  namespace: helmsman
  labels:
    app: helmsman
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helmsman
  template:
    metadata:
      labels:
        app: helmsman
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: helmsman
          image: helmsman:latest
          imagePullPolicy: Never   # use local image from Docker Desktop
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: helmsman-config
          # Liveness: is the process alive?
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # Readiness: is there at least one healthy backend?
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: helmsman
  namespace: helmsman
spec:
  type: NodePort
  selector:
    app: helmsman
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: helmsman-hpa
  namespace: helmsman
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: helmsman
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
